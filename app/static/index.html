<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#FBFAF8" />
  <title>Handoff — AI Employee Deployment Control Plane</title>
  <meta name="description" content="Handoff compiles a messy finance SOP into a grounded, gated verdict on whether the work can be delegated to an AI employee." />
  <script>
    // Set the theme before paint to avoid a flash of the wrong palette.
    (function () {
      try {
        var saved = localStorage.getItem("handoff.theme");
        var theme = saved === "light" || saved === "dark" ? saved : "light";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
  <link rel="preload" href="/static/fonts/plus-jakarta-sans-wght.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/static/fonts/jetbrains-mono-wght.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/static/fonts/chakra-petch-600.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="/static/css/tokens.css?v=7" />
  <link rel="stylesheet" href="/static/css/base.css?v=7" />
  <link rel="stylesheet" href="/static/css/components.css?v=7" />
</head>
<body>
  <div class="shell">
    <header class="suitebar">
      <div class="brand" id="brandHome" role="button" tabindex="0" aria-label="Handoff home">
        <span class="brand__name">Handoff</span>
      </div>
      <nav class="suitenav" id="suitenav" aria-label="Handoff">
        <a data-nav="processes" href="#/">Processes</a>
        <a data-nav="ledger" href="#/ledger">Run Ledger</a>
        <a data-nav="trust" href="#/trust">Trust Center</a>
      </nav>
      <div class="suitebar__right">
        <button class="runtime-chip" id="runtimeChip" type="button" data-action="model-settings" title="Choose model — bring your own key">
          <span class="dot"></span>
          <span class="rt-engine">connecting…</span>
          <span class="rt-db"></span>
        </button>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="main" id="view" aria-live="polite"></main>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script type="module" src="/static/js/main.js?v=7"></script>
</body>
</html>
